{{ define "main" }}
<section class="section">
  <h1>{{ .Title }}</h1>
  <div class="section-content">
    {{ .Content }}
  </div>
  {{ range .Pages.ByPublishDate.Reverse }}
  <article class="post-item">
    <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
    <div class="post-meta">
      {{ partial "meta.html" . }}
    </div>
  </article>
  <hr>
  {{ end }}
</section>
{{ end }}
