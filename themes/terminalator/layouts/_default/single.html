{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      {{ partial "meta.html" . }}
      <span class="reading-time">~ {{ .ReadingTime }} min read</span>
    </div>
  </header>
  {{ with .TableOfContents }}
  <nav class="table-of-contents">
    <h2>Table of Contents</h2>
    {{ . }}
  </nav>
  {{ end }}
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
