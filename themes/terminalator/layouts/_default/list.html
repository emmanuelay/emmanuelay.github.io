{{ define "main" }}
<section class="post-list">
  <h1>{{ .Title }}</h1>
  {{ range .Paginator.Pages.ByPublishDate.Reverse }}
  <article class="post-item">
    <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
    <div class="post-meta">
      {{ partial "meta.html" . }}
    </div>
    {{ with .Summary }}
    <p class="post-summary">{{ . | plainify | truncate 200 }}</p>
    {{ end }}
  </article>
  <hr>
  {{ end }}
  {{ partial "paginator.html" . }}
</section>
{{ end }}
